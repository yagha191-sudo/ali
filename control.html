<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الكاملة بالموقع</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #121212; color: #fff; padding: 15px; text-align: center; direction: rtl; }
        .box { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; text-align: right; }
        input, button { padding: 12px; margin: 8px 0; width: 100%; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: #fff; }
        button { background: #cca43b; color: #121212; font-weight: bold; cursor: pointer; border: none; font-size: 1.1rem; }
        label { font-weight: bold; color: #cca43b; }
    </style>
</head>
<body>

    <h2>⚙️ لوحة التحكم بمظهر ومحتوى الموقع</h2>

    <!-- إعدادات الألوان والصور الخلفية -->
    <div class="box">
        <h3>🎨 إعدادات الألوان والصور الخلفية</h3>
        <label>اللون الرئيسي للموقع (الأزرار والهيدر):</label>
        <input type="color" id="mainColor" value="#2c5d4f">
        
        <label>رابط صورة الخلفية (رابط URL مباشر للصورة):</label>
        <input type="text" id="bgImageUrl" placeholder="ضع رابط صورة إذا أردت خلفية للموقع">
    </div>

    <!-- التحكم بالأذكار المتتالية للسبحة -->
    <div class="box">
        <h3>📿 تعديل محتوى سلسلة السبحة</h3>
        <label>الذكر الأول (الحالي: سبحان الله):</label>
        <input type="text" id="name0" placeholder="الاسم الجديد للذكر الأول">
        <input type="number" id="limit0" placeholder="عدد التكرار (مثلاً: 33)">

        <hr style="border-color:#333;">

        <label>الذكر الثاني (الحالي: الحمد لله):</label>
        <input type="text" id="name1" placeholder="الاسم الجديد للذكر الثاني">
        <input type="number" id="limit1" placeholder="عدد التكرار (مثلاً: 33)">
    </div>

    <button onclick="saveSettingsToServer()">حفظ التعديلات ونشرها فوراً 🔄</button>

    <!-- ربط سكريبتات فايربيس السحابية بشكل صحيح برمجياً -->
     <script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>

    <script>
        // مفاتيح الربط الحقيقية والخاصة بمشروعك (مغلفة داخل وسم السكريبت البرمي)
        const firebaseConfig = {
            apiKey: "AIzaSyBrGTJnMD7fDH4G4-w6cCc-864Z31g1TT8",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebaseio.com",
            projectId: "athkar-app-ddba2",
            storageBucket: "athkar-app-ddba2.firebasestorage.app",
            messagingSenderId: "996299888457",
            appId: "1:996299888457:web:ea2ba329abd9db4709ac98"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // دالة إرسال الخيارات الجديدة إلى السيرفر الحي
        function saveSettingsToServer() {
            const mainColor = document.getElementById("mainColor").value;
            const bgImageUrl = document.getElementById("bgImageUrl").value;
            
            database.ref('settings').set({
                themeColor: mainColor,
                bgImage: bgImageUrl
            });

            const n0 = document.getElementById("name0").value;
            const l0 = document.getElementById("limit0").value;
            if(n0 && l0) {
                database.ref('thikr/0').set({ name: n0 + " 📿", cleanName: n0, limit: parseInt(l0) });
            }

            const n1 = document.getElementById("name1").value;
            const l1 = document.getElementById("limit1").value;
            if(n1 && l1) {
                database.ref('thikr/1').set({ name: n1 + " 🤲", cleanName: n1, limit: parseInt(l1) });
            }

            alert("تم تحديث مظهر ومحتوى الموقع بنجاح!");
        }
    </script>
</body>
</html>
